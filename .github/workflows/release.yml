name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Linux
        run: |
          cargo build --release
          cd target/release
          tar -czf ../../rusty-karlsen-v3.1.1-linux-musl-amd64.tar.gz karlsend
      - uses: actions/upload-artifact@v3
        with:
          name: linux-binary
          path: rusty-karlsen-v3.1.1-linux-musl-amd64.tar.gz

  build-macos-amd64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Build macOS AMD64
        run: |
          cargo build --release
          cd target/release
          zip ../../rusty-karlsen-v3.1.1-macos-amd64.zip karlsend
      - uses: actions/upload-artifact@v3
        with:
          name: macos-amd64-binary
          path: rusty-karlsen-v3.1.1-macos-amd64.zip

  build-macos-aarch64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - name: Build macOS ARM64
        run: |
          cargo build --release --target aarch64-apple-darwin
          cd target/aarch64-apple-darwin/release
          zip ../../../rusty-karlsen-v3.1.1-macos-aarch64.zip karlsend
      - uses: actions/upload-artifact@v3
        with:
          name: macos-aarch64-binary
          path: rusty-karlsen-v3.1.1-macos-aarch64.zip

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Build Windows
        run: |
          cargo build --release
          cd target/release
          Compress-Archive -Path karlsend.exe -DestinationPath ../../rusty-karlsen-v3.1.1-windows-msvc-amd64.zip
      - uses: actions/upload-artifact@v3
        with:
          name: windows-binary
          path: rusty-karlsen-v3.1.1-windows-msvc-amd64.zip

  build-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build WASM
        run: |
          cd wasm
          cargo build --release --target wasm32-unknown-unknown
          zip ../karlsen-wasm32-sdk-v3.1.1.zip target/wasm32-unknown-unknown/release/*.wasm
      - uses: actions/upload-artifact@v3
        with:
          name: wasm-sdk
          path: karlsen-wasm32-sdk-v3.1.1.zip

  create-release:
    needs: [build-linux, build-macos-amd64, build-macos-aarch64, build-windows, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v3
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            linux-binary/rusty-karlsen-v3.1.1-linux-musl-amd64.tar.gz
            macos-amd64-binary/rusty-karlsen-v3.1.1-macos-amd64.zip
            macos-aarch64-binary/rusty-karlsen-v3.1.1-macos-aarch64.zip
            windows-binary/rusty-karlsen-v3.1.1-windows-msvc-amd64.zip
            wasm-sdk/karlsen-wasm32-sdk-v3.1.1.zip
